        <p align="justify"> Agende uma aula experimental <b>Grátis!</b> </p>

        <form name="" method="" action="">
            <label for="nome"> Nome: </label><br />
            <input id="nome" type="text" name="nome_completo" size="40" placeholder="Nome Completo" required
                autofocus />
            <br />
            <label for="email"> E-mail: </label><br />
            <input id="email" type="email" name="email" size="40" placeholder="nomeusuario@gmail.com">
            <br />

            <label for="senha"> Senha: </label> <br/>
            <input id="senha" type="password" name="senha" size="40" placeholder="Digite sua senha">
            <br />

            <label for="celular"> Celular: </label> <br/>
            <input id="celular" type="tel" name="celular" size="40" placeholder="(99) 99999-9999"
                pattern="\(\d{2}\)\s\d{5}-\d{4}" required>
            <br/>

            <label for="data"> Data: </label> 
            <input id="data"    type="date" name="data">

            <label> Hora: </label>
            <input id="hora"    type="time" name="hora">

            <label> Aulas: </label>
            <input id="hora"    type="number" name="hora" min="1" max="10" step="1">










            <br/>
            <input type="submit" name="botao-agendar" />
            <input type="reset" name="botao-cancelar" />
        </form>
